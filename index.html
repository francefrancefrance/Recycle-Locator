<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recycling Map</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Landing screen -->
    <div id="landing-screen">
        <h1>Find Recycling Centers</h1>
        <p>Enter your town to see local recycling centers:</p>
        <input type="text" id="town-input" placeholder="e.g., New London">
        <button id="search-btn">Search</button>
    </div>

    <!-- Main content (map + locations) -->
    <main id="main-content" style="display:none;">
        <header>
            <h1 id="map-title">Recycling Centers</h1>
        </header>

        <div id="map"></div>
        <div id="locations">
            <h2>Recycling Locations</h2>
            <ul id="location-list"></ul>
        </div>

        <footer>
            <p>2025 Recycling Map</p>
        </footer>
    </main>

    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>
    <script src="script.js"></script>
</body>
</html>
